# Cloudflare Tunnel configuration snippet
# Add this to /etc/cloudflared/config.yml or ~/.cloudflared/config.yml

# Hermes Voice Pipeline (Twilio → Pipecat)
- hostname: voice.reneetoufee.com
  service: http://localhost:8080

# Setup (one-time):
#   cloudflared tunnel login
#   cloudflared tunnel create hermes-voice
#   cloudflared tunnel route dns hermes-voice voice.reneetoufee.com
#   cloudflared tunnel run hermes-voice
